<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp QR Login | Baileys Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(37, 211, 102, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(18, 140, 126, 0.05) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
        }

        .logo svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .qr-wrapper {
            background: white;
            padding: 24px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 32px;
            position: relative;
            min-width: 256px;
            min-height: 256px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        #qrcode img {
            margin: 0 auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            margin-top: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-waiting .status-dot { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
        .status-connected .status-dot { background: #25D366; box-shadow: 0 0 8px #25D366; }
        .status-error .status-dot { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        .instructions {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
            margin-top: 32px;
        }

        .instructions ol {
            margin-left: 20px;
            color: var(--text-dim);
            font-size: 14px;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(37, 211, 102, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-icon {
            color: var(--primary);
            font-size: 48px;
            margin-bottom: 16px;
        }
        .btn-logout {
            margin-top: 24px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-logout:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </div>
        <h1>Link WhatsApp</h1>
        <p id="sub-title">Scan the QR code to connect your account</p>

        <div class="qr-wrapper">
            <div id="qrcode"></div>
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
            </div>
            <div id="success" style="display: none; padding: 20px;">
                <div class="success-icon">✓</div>
                <h2 style="color: var(--primary); margin-bottom: 8px;">Connected!</h2>
                <p style="margin-bottom: 16px; font-size: 14px;">Your WhatsApp is linked and ready.</p>
                <button id="logout-btn" class="btn-logout" onclick="logout()">Disconnect Account</button>
            </div>
        </div>

        <div>
            <div id="status-badge" class="status-badge status-waiting">
                <span class="status-dot"></span>
                <span id="status-text">Waiting for QR...</span>
            </div>
        </div>

        <div class="instructions">
            <ol>
                <li>Open WhatsApp on your phone</li>
                <li>Tap <strong>Menu</strong> or <strong>Settings</strong> and select <strong>Linked Devices</strong></li>
                <li>Tap on <strong>Link a Device</strong></li>
                <li>Point your phone to this screen to capture the code</li>
            </ol>
        </div>
    </div>

    <script>
        const qrcodeElement = document.getElementById("qrcode");
        const loadingElement = document.getElementById("loading");
        const successElement = document.getElementById("success");
        const statusBadge = document.getElementById("status-badge");
        const statusText = document.getElementById("status-text");
        const subTitle = document.getElementById("sub-title");
        
        let qr = new QRCode(qrcodeElement, {
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        let currentQR = null;
        let isConnected = false;

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    
                    if (data.connected) {
                        if (!isConnected) {
                            isConnected = true;
                            showSuccess();
                        }
                    } else {
                        isConnected = false;
                        successElement.style.display = "none";
                        qrcodeElement.style.display = "block";
                        
                        if (data.qr) {
                            if (currentQR !== data.qr) {
                                currentQR = data.qr;
                                qr.clear();
                                qr.makeCode(data.qr);
                                loadingElement.style.display = "none";
                                statusBadge.className = "status-badge status-waiting";
                                statusText.innerText = "Ready to scan";
                            }
                        } else if (data.connecting) {
                            loadingElement.style.display = "flex";
                            statusBadge.className = "status-badge status-waiting";
                            statusText.innerText = "Generating QR...";
                        } else {
                            statusBadge.className = "status-badge status-error";
                            statusText.innerText = "Disconnected";
                        }
                    }
                }
            } catch (error) {
                console.error("Status check failed:", error);
                statusBadge.className = "status-badge status-error";
                statusText.innerText = "Connection Error";
            }
        }

        function showSuccess() {
            loadingElement.style.display = "none";
            qrcodeElement.style.display = "none";
            successElement.style.display = "block";
            statusBadge.className = "status-badge status-connected";
            statusText.innerText = "Connected";
            subTitle.innerText = "Your WhatsApp is linked and ready to use";
        }

        async function logout() {
            if (!confirm("Are you sure you want to disconnect this WhatsApp account?")) return;
            
            try {
                const logoutBtn = document.getElementById("logout-btn");
                logoutBtn.disabled = true;
                logoutBtn.innerText = "Disconnecting...";
                
                const response = await fetch('/api/logout', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    isConnected = false;
                    successElement.style.display = "none";
                    qrcodeElement.style.display = "block";
                    loadingElement.style.display = "flex";
                    statusBadge.className = "status-badge status-waiting";
                    statusText.innerText = "Disconnecting...";
                    subTitle.innerText = "Scan the QR code to connect your account";
                    currentQR = null;
                }
            } catch (error) {
                console.error("Logout failed:", error);
                alert("Failed to disconnect. Please try again.");
                const logoutBtn = document.getElementById("logout-btn");
                logoutBtn.disabled = false;
                logoutBtn.innerText = "Disconnect Account";
            }
        }

        // Check status every 3 seconds
        setInterval(checkStatus, 3000);
        checkStatus();
    </script>
</body>
</html>
